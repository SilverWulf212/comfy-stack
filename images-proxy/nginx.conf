worker_processes 1;
events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 30;

    # Map the public host to a single MinIO bucket on the ollamawulf network.
    # Public URL pattern: https://images.silverwulf.work/<filename>
    # Backend URL pattern: http://onyx-minio:9000/generated-images/<filename>

    server {
        listen 80 default_server;
        server_name _;

        # Block listing the bucket; only allow direct file fetches.
        location = / {
            return 404;
        }

        location / {
            proxy_pass http://onyx-minio:9000/generated-images/;
            proxy_set_header Host onyx-minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_intercept_errors on;
            error_page 403 404 = @notfound;

            # Cache headers — these images are immutable (content-addressed).
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location @notfound {
            return 404 "Not found\n";
        }
    }
}
